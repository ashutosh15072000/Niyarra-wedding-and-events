name: Niyarra CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: niyarra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install playwright pytest-playwright ruff

    - name: Lint with ruff
      run: ruff check backend/

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Backend Smoke Test
      run: |
        cd backend
        # Start uvicorn in background
        nohup uvicorn main:app --host 127.0.0.1 --port 8000 &
        # Wait for server to be ready
        timeout 60s bash -c 'until curl -s http://127.0.0.1:8000/index.html; do sleep 2; done'
        
    - name: Run Frontend Playwright Test
      run: |
        python frontend/test.py
      env:
        SERVER_URL: http://127.0.0.1:8000
